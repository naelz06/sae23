<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Instant Weather</title>
    <link rel="stylesheet" href="Projet.css" />
    <script defer src="Projet.js"></script>
  </head>

  <body>
    <header>
      <h1>INSTANT WEATHER</h1>
      <p>Choisir sa commune et consulter la météo associée</p>
    </header>

    <main>
      <section>
        <form>
            <input type="text" id="code-postal" placeholder="Saisir un code postal" />
          
            <label for="nbJoursSelect">Nombre de jours :</label>
            <select id="nbJoursSelect">
              <option value="1">1 jour</option>
              <option value="2">2 jours</option>
              <option value="3">3 jours</option>
              <option value="4">4 jours</option>
              <option value="5">5 jours</option>
              <option value="6">6 jours</option>
              <option value="7">7 jours</option>
            </select>
          
            <select id="communeSelect" style="display: none;"></select>
            <button type="button" id="validationButton" style="display: none;">Valider</button>
          </form>
          
          <section id="meteoResultats"></section>
          

      </section>

      <!-- Zone d'affichage de la météo -->
      <section id="meteoResultats"></section>
    </main>
  </body>
</html>
